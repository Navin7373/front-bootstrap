<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuiceINN-Paynow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="paynow.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-light">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                <img src="logo1.png" height="80px">
            </a>

            <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#juiceOffcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="offcanvas offcanvas-end" id="juiceOffcanvas">

                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto fw-bold">

                        <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu.html">MENU</a></li>
                        <li class="nav-item"><a class="nav-link" href="offer.html">OFFERS</a></li>
                        <li class="nav-item"><a class="nav-link" href="special.html">SPECIALS</a></li>
                        <li class="nav-item"><a class="nav-link" href="viewcart.html">VIEW CART</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">LOGIN</a></li>

                    </ul>
                </div>
            </div>

        </div>
    </nav>

    <!-- MAIN -->
    <div class="container pay-box">

        <h2 class="text-center fw-bold mb-4">Checkout</h2>

        <div class="row g-4">

            <!-- LEFT – ADDRESS -->
            <div class="col-12 col-md-7">
                <div class="card p-4 shadow-sm">

                    <h5>Delivery Details</h5>

                    <div class="mb-3">
                        <label>Name</label>
                        <input id="name" class="form-control" placeholder="Your name">
                    </div>

                    <div class="mb-3">
                        <label>Mobile Number</label>
                        <input id="mobile" class="form-control" placeholder="Phone number">
                    </div>

                    <div class="mb-3">
                        <label>Address</label>
                        <textarea id="address" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Landmark</label>
                        <input id="landmark" class="form-control" placeholder="Near by place">
                    </div>

                </div>
            </div>

            <!-- RIGHT – SUMMARY -->
            <div class="col-12 col-md-5">
                <div class="card p-4 shadow-sm">

                    <h5>Order Summary</h5>

                    <div class="d-flex justify-content-between">
                        <span>Items Total</span>
                        <span class="itotal">0</span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Delivery</span>
                        <span class="delivery">50</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold">
                        <span>Total</span>
                        <span class="total">0</span>
                    </div>

                    <h6 class="mt-3">Payment Method</h6>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pay" id="cod" checked>
                        <label>Cash on Delivery</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pay" id="upi">
                        <label>UPI / Card</label>
                    </div>

                    <button onclick="goPayment()" class="btn pay-btn w-100 mt-3">
                        Confirm & Pay
                    </button>

                </div>
            </div>

        </div>
    </div>


    <!-- SCRIPT -->
    <script>

        let itotal = document.getElementsByClassName("itotal")[0];
        let delivery = document.getElementsByClassName("delivery")[0];
        let total = document.getElementsByClassName("total")[0];

        // Load cart from localStorage and calculate items total
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let itemsTotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        itotal.innerText = itemsTotal;

        function updateTotal() {
            let itemsAmount = Number(itotal.innerText);
            let deliveryAmount = Number(delivery.innerText);
            total.innerText = itemsAmount + deliveryAmount;
        }

        updateTotal();


        function goPayment() {

            let name = document.getElementById("name").value;
            let mobile = document.getElementById("mobile").value;
            let address = document.getElementById("address").value;
            let landmark = document.getElementById("landmark").value;

            // empty check
            if (name === "" || mobile === "" || address === "" || landmark === "") {
                alert("Please fill all delivery details");
                return;
            }

            if (document.getElementById("cod").checked) {
                window.location.href = "success.html";
            }

            else if (document.getElementById("upi").checked) {
                window.location.href = "upi.html";
            }

        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
