<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuiceInn-Login</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!--navbar-->

    <nav class="navbar navbar-expand-lg fixed-top navbar-light ">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                <img src="logo1.png" height="80px">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#juiceOffcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="juiceOffcanvas">


                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto fw-bold">

                        <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu.html">MENU</a></li>
                        <li class="nav-item"><a class="nav-link" href="offer.html">OFFERS</a></li>
                        <li class="nav-item"><a class="nav-link" href="special.html">SPECIALS</a></li>
                        <li class="nav-item"><a class="nav-link" href="viewcart.html">VIEW CART</a></li>

                    </ul>
                </div>
            </div>

        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="card login-card p-4 shadow">

            <h3 class="text-center fw-bold mb-3">Login</h3>

            <form>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control email" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control password" placeholder="Enter password">
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <div>
                        <input type="checkbox"> Remember me
                    </div>

                    <a href="#" class="text-decoration-none">Forgot password?</a>
                </div>

                <button class="btn login-btn w-100">
                    Login
                </button>

                <div class="text-center mt-3">
                    Don't have account?
                    <a href="signup.html" class="text-decoration-none fw-bold">
                        Signup
                    </a>
                </div>
                <p id="msg" style="color: red;"></p>

            </form>

        </div>
    </div>
    <script>

        let form = document.getElementsByTagName("form")[0];
        let msg = document.getElementById("msg");

        form.addEventListener("submit", function (event) {

            event.preventDefault();

            let email = document.getElementsByClassName("email")[0].value;
            let password = document.getElementsByClassName("password")[0].value;

            if (email === "") {

                msg.textContent = "Please enter your email";

            }
            else if (password.length < 6) {

                msg.textContent = "Password must be 6 characters";

            }
            else {

                // SUCCESS PART
                msg.style.color = "green";
                msg.textContent = "Login Successful 👍";

                window.location.href = "index.html";

            }

        });

    </script>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
